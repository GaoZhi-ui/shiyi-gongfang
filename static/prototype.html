<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>拾遗工坊原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;height:100vh;background:#111;color:#ccc;display:flex}
.sidebar{width:280px;background:#1a1a1a;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid #2a2a2a}
.sidebar-header h1{font-size:16px;color:#e8a84c;letter-spacing:1px}
.toolbox{flex:1;overflow-y:auto;padding:8px}
.tool-group-title{font-size:11px;color:#555;padding:8px 12px 4px;letter-spacing:1px}
.tool-item{padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:6px;font-size:13px;color:#999}
.tool-item:hover{background:#252525;color:#e8a84c}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:12px 20px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:12px}
.chat-area{flex:1;overflow-y:auto;padding:20px}
.msg{margin-bottom:20px;display:flex;gap:12px}
.msg-avatar{width:32px;height:32px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:#2a2a2a;color:#e8a84c}
.msg-content{flex:1;min-width:0;font-size:14px;line-height:1.7}
.input-area{padding:16px 20px;border-top:1px solid #2a2a2a}
.input-wrapper{display:flex;gap:10px}
.input-wrapper textarea{flex:1;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:12px;color:#ccc;font-size:14px;resize:none;min-height:48px}
.send-btn{width:48px;height:48px;background:#e8a84c;border:none;border-radius:8px;color:#111;font-size:18px;cursor:pointer}
.right-panel{width:360px;background:#1a1a1a;border-left:1px solid #2a2a2a}
.panel-header{padding:16px 20px;border-bottom:1px solid #2a2a2a;font-size:14px;color:#e8a84c}
.panel-body{padding:16px 20px;overflow-y:auto;height:calc(100vh-56px);font-size:13px;color:#999}
.status-bar{padding:6px 20px;border-top:1px solid #2a2a2a;display:flex;gap:20px;font-size:11px;color:#555}
</style></head>
<body>
<div class="sidebar">
  <div class="sidebar-header"><h1>✦ 拾遗工坊</h1></div>
  <div class="toolbox">
    <div class="tool-group-title">写作流程</div>
    <div class="tool-item">📋 9阶段流程</div>
    <div class="tool-item">✅ 自检清单</div>
    <div class="tool-item">🔍 自动审查</div>
    <div class="tool-group-title">知识库</div>
    <div class="tool-item">📚 工具箱一览</div>
    <div class="tool-item">✍️ 写作风格速查</div>
    <div class="tool-item">👥 人物档案</div>
    <div class="tool-group-title">章节管理</div>
    <div class="tool-item">🗺️ 全卷细纲</div>
    <div class="tool-item">📅 时间线表</div>
    <div class="tool-item">🔗 伏笔追踪</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <span>卷二 · 归途未定</span>
    <span style="margin-left:auto">⚙ API设置</span>
  </div>
  <div class="chat-area">
    <div class="msg"><div class="msg-avatar">✦</div><div class="msg-content">你好，我是拾遗工坊。<br><br>• <b>检查当前章节</b><br>• <b>运行审查</b><br>• <b>调取知识库</b></div></div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea rows="2" placeholder="输入写作指令…"></textarea>
      <button class="send-btn">↵</button>
    </div>
  </div>
</div>
<div class="right-panel">
  <div class="panel-header">📋 自检清单</div>
  <div class="panel-body">
    场景首尾测试<br>展示不告诉测试<br>"他心想"压强测试<br>字数2000+<br>密度≤6<br>"不是A是B"≤2<br>"他"≤15/千字
  </div>
</div>
</body></html>
