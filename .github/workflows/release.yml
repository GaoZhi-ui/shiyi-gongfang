name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  APP_NAME: shiyi-gongfang

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --onedir
      - name: Package
        shell: bash
        run: |
          suffix="${{ runner.os }}"
          case "$suffix" in
            Windows) suffix="win64" ;;
            macOS) suffix="macos" ;;
            Linux) suffix="linux-x86_64" ;;
          esac
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path dist/${APP_NAME}/* -DestinationPath ${APP_NAME}-${GITHUB_REF_NAME}-${suffix}.zip -Force"
          else
            cd dist && zip -r "../${APP_NAME}-${GITHUB_REF_NAME}-${suffix}.zip" "${APP_NAME}/" && cd ..
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten and Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find artifacts/ -type f -name "*.zip" -exec mv {} . \;
          rm -rf artifacts/*/
          ls -la *.zip
          gh release create "$GITHUB_REF_NAME" \
            --title "写作助手工坊 $GITHUB_REF_NAME" \
            --generate-notes \
            *.zip
