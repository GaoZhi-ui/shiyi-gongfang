name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 版本号（如 1.0.0）
        required: true

permissions:
  contents: write

env:
  APP_NAME: shiyi-gongfang

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --onedir
      - name: Package
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) suffix="win64" ;;
            macOS)   suffix="macos" ;;
            Linux)   suffix="linux-x86_64" ;;
          esac
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "../${APP_NAME}-${{ github.ref_name }}-${suffix}.zip" "${APP_NAME}/"
          else
            zip -r "../${APP_NAME}-${{ github.ref_name }}-${suffix}.zip" "${APP_NAME}/"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ runner.os }}
          path: ${{ github.ref_name }}-*.zip

  release:
    if: ${{ success() }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Creating release for ${GITHUB_REF_NAME}..."
          echo "Using token: ${GITHUB_TOKEN:0:10}..."
          # First verify token works
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}" > /dev/null && \
            echo "Token OK" || echo "Token FAILED"
          # Then create the release
          curl -v -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$GITHUB_REF_NAME\",\"name\":\"写作助手工坊 $GITHUB_REF_NAME\",\"body\":\"由 GitHub Actions 自动构建。\\n\\n## 下载\\n| 平台 | 便携版 |\\n|------|--------|\\n| Windows | \\`${APP_NAME}-${GITHUB_REF_NAME}-win64.zip\\` |\\n| macOS | \\`${APP_NAME}-${GITHUB_REF_NAME}-macos.zip\\` |\\n| Linux | \\`${APP_NAME}-${GITHUB_REF_NAME}-linux-x86_64.zip\\` |\",\"draft\":false,\"prerelease\":false}" 2>&1 | tee /tmp/release.log
          echo "---"
          cat /tmp/release.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
