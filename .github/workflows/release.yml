name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 版本号（如 1.0.0）
        required: true

permissions:
  contents: write

env:
  APP_NAME: shiyi-gongfang

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --onedir
      - name: Package
        shell: bash
        run: |
          suffix="${{ runner.os }}"
          case "$suffix" in
            Windows) suffix="win64" ;;
            macOS) suffix="macos" ;;
            Linux) suffix="linux-x86_64" ;;
          esac
          echo "Packaging for $suffix..."
          ls -la dist/
          if [ -d "dist/${APP_NAME}" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              powershell -Command "Compress-Archive -Path dist/${APP_NAME}/* -DestinationPath ${APP_NAME}-${GITHUB_REF_NAME}-${suffix}.zip -Force"
            else
              cd dist && zip -r "../${APP_NAME}-${GITHUB_REF_NAME}-${suffix}.zip" "${APP_NAME}/" && cd ..
            fi
            ls -la "${APP_NAME}-${GITHUB_REF_NAME}-${suffix}.zip"
          else
            echo "ERROR: dist/${APP_NAME} not found!"
            ls -la dist/
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ runner.os }}
          path: "*.zip"

  release:
    if: ${{ success() }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          echo "Creating release for $GITHUB_REF_NAME..."
          echo "Artifacts:"
          ls -la artifacts/
          for d in artifacts/*/; do echo "  $d:"; ls -la "$d"; done
          # Create release via API
          PAYLOAD="{\"tag_name\":\"$GITHUB_REF_NAME\",\"name\":\"写作助手工坊 $GITHUB_REF_NAME\",\"body\":\"自动构建\",\"draft\":false,\"prerelease\":false}"
          echo "Payload: $PAYLOAD"
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
            -d "{\"tag_name\":\"$GITHUB_REF_NAME\"}")
          echo "Response: $RESP"
          RELEASE_ID=$(echo "$RESP" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d.get('id','ERR'))" 2>/dev/null || echo "PARSE_ERR")
          echo "Release ID: $RELEASE_ID"
          # Upload assets
          find artifacts/ -name "*.zip" -type f | while read f; do
            echo "Uploading $(basename \"$f\")..."
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/zip" \
              "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$(basename \"$f\")" \
              --data-binary @"$f"
            echo ""
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
