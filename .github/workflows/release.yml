name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 版本号（如 1.0.0）
        required: true

permissions:
  contents: write

env:
  APP_NAME: shiyi-gongfang

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --onedir
      - name: Package
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) suffix="win64" ;;
            macOS)   suffix="macos" ;;
            Linux)   suffix="linux-x86_64" ;;
          esac
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "../${APP_NAME}-${{ github.ref_name }}-${suffix}.zip" "${APP_NAME}/"
          else
            zip -r "../${APP_NAME}-${{ github.ref_name }}-${suffix}.zip" "${APP_NAME}/"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ runner.os }}
          path: ${{ github.ref_name }}-*.zip

  release:
    if: ${{ success() }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Creating release for v${VERSION}..."
          echo "Files:"
          find artifacts/ -name "*.zip" -type f
          # Upload each zip as a release asset
          for f in $(find artifacts/ -name "*.zip" -type f); do
            echo "  Uploading: $(basename $f)"
          done
          # Create release via API
          curl -s -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$GITHUB_REF_NAME\",\"name\":\"写作助手工坊 $GITHUB_REF_NAME\",\"body\":\"自动构建。\",\"draft\":false,\"prerelease\":false}"
